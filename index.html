<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gästeliste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .card {
      max-width: 600px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .entry {
      background: #0f172a;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Gästeliste</h2>

  <input id="nameInput" type="text" placeholder="Dein Name">
  <input id="imageInput" type="file" accept="image/*">
  <button onclick="addEntry()">Eintragen</button>

  <p id="status"></p>

  <h3>Alle Einträge</h3>
  <div id="entries"></div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
if (file) {
  const fileName = Date.now() + "_" + file.name;

  const { data: uploadData, error: uploadError } = await client.storage
    .from("avatars")
    .upload(fileName, file);

  if (uploadError) {
    status.textContent = "Fehler beim Bild-Upload.";
    console.error(uploadError);
    return;
  }

  // KORREKTE URL holen
  const { data: publicUrlData } = client.storage
    .from("avatars")
    .getPublicUrl(fileName);

  imageUrl = publicUrlData.publicUrl;
}

  <script/>


</body>
</html>
